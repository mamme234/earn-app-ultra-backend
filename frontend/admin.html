<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>Admin Panel</h2>
<div id="list"></div>

<script>
const API="https://earn-app-ultra-backend-1.onrender.com";

function load(){
fetch(API+"/admin/withdrawals")
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach((w,i)=>{
html+=`<p>${w.username} - ${w.amount}USDT - ${w.wallet} - ${w.status}
<button onclick="approve(${i})">Approve</button></p>`;
});
document.getElementById("list").innerHTML=html;
});
}

function approve(i){
fetch(API+"/admin/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({index:i})})
.then(()=>load());
}

load();
</script>

</body>
</html>
