<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Earn Ultra</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b0b0b;color:#fff;text-align:center;}
.card{background:#111;margin:10px;padding:15px;border-radius:15px;}
.row{display:flex;justify-content:space-between;margin:5px 0;}
.orange{color:orange;}
.tap{width:150px;height:150px;background:gold;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:20px;font-weight:bold;}
.nav{position:fixed;bottom:0;width:100%;display:flex;}
.nav button{flex:1;padding:10px;background:#111;color:#fff;border:none;}
.float{position:absolute;color:gold;animation:up 1s forwards;}
@keyframes up{100%{transform:translateY(-60px);opacity:0;}}

/* SOCIAL */
.social-btn{width:100%;padding:12px;margin:6px 0;border:none;border-radius:12px;color:#fff;font-weight:bold;}
.tg{background:#0088cc;}
.tiktok{background:#ff0050;}
.yt{background:red;}

/* POPUP */
#rewardPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:gold;
color:#000;
padding:10px 20px;
border-radius:20px;
display:none;
font-weight:bold;
}

/* LIVE FEED */
#liveFeed{
position:fixed;
bottom:70px;
left:10px;
background:#111;
padding:10px;
border-radius:10px;
font-size:12px;
color:#0f0;
}

/* REFERRAL */
#refBox{
display:flex;
margin-top:10px;
}
#refLink{
flex:1;
padding:8px;
border-radius:10px;
border:none;
text-align:center;
background:#222;
color:#fff;
}
.copy-btn{
padding:8px;
background:gold;
border:none;
border-radius:10px;
margin-left:5px;
}
</style>
</head>

<body>

<div id="rewardPopup">+0</div>
<div id="liveFeed">💸 User withdrew 2 USDT</div>

<!-- HOME -->
<div id="home">
<div class="card">
<div class="row"><span>Level</span><span id="level">1</span></div>
<div class="row"><span>Coins</span><span id="coins">0</span></div>
<div class="row"><span>USDT</span><span id="usdt">0.00</span></div>
</div>

<div class="tap" onclick="tap()">TAP</div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none;">
<div class="card">
<div>👤 <span id="username"></span></div>
<div>Referrals: <span id="refs">0</span></div>

<div id="refBox">
<input id="refLink" readonly>
<button class="copy-btn" onclick="copyRef()">Copy</button>
</div>

<button onclick="shareRef()">🚀 Invite Friends</button>

<button class="social-btn tg" onclick="joinTG()">Join TG +500</button>
<button class="social-btn tiktok" onclick="followTikTok()">TikTok +1000</button>
<button class="social-btn yt" onclick="subscribeYT()">YouTube +500</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
<div class="card">
<input id="amount" placeholder="USDT">
<input id="wallet" placeholder="Wallet">
<button onclick="withdrawNow()">Withdraw</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('profile')">Profile</button>
<button onclick="show('withdraw')">Withdraw</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API="https://node-js-1-v8du.onrender.com";

// ✅ REAL TELEGRAM USERNAME
let user = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.id || "guest";

// LOAD USER
function loadUser(){
let ref=new URLSearchParams(location.search).get("ref");

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,ref})
})
.then(r=>r.json())
.then(update);
}

// TAP
function tap(){
fetch(API+"/tap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(update);

let plus=document.createElement("div");
plus.innerText="+1";
plus.className="float";
document.body.appendChild(plus);
setTimeout(()=>plus.remove(),1000);
}

// UPDATE
function update(data){
let d=data.user?data.user:data;

let coins=d.coins||0;

document.getElementById("coins").innerText=coins;
document.getElementById("usdt").innerText=(coins/1000).toFixed(2);

let level=Math.floor(coins/10000)+1;
document.getElementById("level").innerText=level;

document.getElementById("refs").innerText=d.refs||0;
document.getElementById("username").innerText=user;

document.getElementById("refLink").value=location.origin+"?ref="+user;
}

// NAV
function show(x){
document.getElementById("home").style.display="none";
document.getElementById("profile").style.display="none";
document.getElementById("withdraw").style.display="none";
document.getElementById(x).style.display="block";
}

// SOCIAL
function joinTG(){reward("join-telegram",500);}
function followTikTok(){reward("reward",1000,"tiktok");}
function subscribeYT(){reward("reward",500,"youtube");}

function reward(url,amount,type){
fetch(API+"/"+url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,type})
})
.then(r=>r.json())
.then(d=>{
update(d);
showReward(amount);
});
}

// POPUP
function showReward(a){
let p=document.getElementById("rewardPopup");
p.innerText="💰 +"+a;
p.style.display="block";
setTimeout(()=>p.style.display="none",1500);
}

// REFERRAL
function copyRef(){
navigator.clipboard.writeText(document.getElementById("refLink").value);
alert("Copied!");
}

function shareRef(){
let link=document.getElementById("refLink").value;
let text="🔥 Earn USDT free!\n"+link;

if(navigator.share){
navigator.share({text,url:link});
}else{
copyRef();
}
}

// WITHDRAW
function withdrawNow(){
let amount=document.getElementById("amount").value;
let wallet=document.getElementById("wallet").value;

fetch(API+"/withdraw",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,amount,wallet})
})
.then(r=>r.json())
.then(d=>alert(d.message||d.error));
}

// FAKE LIVE FEED
setInterval(()=>{
let names=["Abel","Noah","Sara","John"];
let amt=[1,2,5,10];
document.getElementById("liveFeed").innerText=
"💸 "+names[Math.random()*4|0]+" withdrew "+amt[Math.random()*4|0]+" USDT";
},4000);

// START
loadUser();
</script>

</body>
  </html>
