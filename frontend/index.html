<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Crypto</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0b;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:90%;
  max-width:400px;
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.row{
  display:flex;
  justify-content:space-between;
}

.orange{color:#ffb347;}

.tap{
  width:180px;
  height:180px;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:20px;
}

.nav{
  position:fixed;
  bottom:10px;
  width:95%;
  display:flex;
}

.nav button{
  flex:1;
  margin:5px;
  padding:10px;
}

</style>
</head>

<body>

<div id="homeScreen">
<div class="card">
<div>Coins: <span id="coins">0</span></div>
<div>USDT: <span id="usdt">0.00</span></div>
</div>

<div class="tap" onclick="tap()">TAP</div>
</div>

<div id="profileScreen" style="display:none;">
<div>Username: <span id="pUser"></span></div>
<div>Refs: <span id="pRefs">0</span></div>
<input id="refLink" readonly>
<button onclick="copyRef()">Copy</button>

<button onclick="joinTG()">Telegram +500</button>
<button onclick="followTikTok()">TikTok +1000</button>
<button onclick="subscribeYT()">YouTube +500</button>
</div>

<div class="nav">
<button onclick="home()">Home</button>
<button onclick="profile()">Profile</button>
</div>

<script>
const API="https://node-js-1-v8du.onrender.com";
let user="guest";

let ref = new URLSearchParams(window.location.search).get("ref");

function load(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,ref:ref})
})
.then(r=>r.json())
.then(update);
}

function tap(){
fetch(API+"/tap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(update);
}

function update(data){
document.getElementById("coins").innerText=data.coins;
document.getElementById("usdt").innerText=(data.coins/100).toFixed(2);
document.getElementById("pRefs").innerText=data.refs;
}

function profile(){
document.getElementById("homeScreen").style.display="none";
document.getElementById("profileScreen").style.display="block";
document.getElementById("pUser").innerText=user;
document.getElementById("refLink").value=location.origin+"?ref="+user;
}

function home(){
document.getElementById("homeScreen").style.display="block";
document.getElementById("profileScreen").style.display="none";
}

function joinTG(){
fetch(API+"/join-telegram",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(update);
}

function followTikTok(){
fetch(API+"/reward",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,type:"tiktok"})})
.then(r=>r.json()).then(update);
}

function subscribeYT(){
fetch(API+"/reward",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,type:"youtube"})})
.then(r=>r.json()).then(update);
}

function copyRef(){
navigator.clipboard.writeText(document.getElementById("refLink").value);
alert("Copied");
}

load();
</script>

</body>
  </html>
