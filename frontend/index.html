<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Earn Ultra</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0b;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARD */
.card{
  width:90%;
  max-width:400px;
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,165,0,0.2);
}

/* BALANCE */
.row{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.orange{color:#ffb347;}
.center{text-align:center;}

/* PROGRESS */
.bar{
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}
.fill{
  width:10%;
  height:100%;
  background:linear-gradient(to right, gold, orange);
}

/* COIN */
.tap-wrap{
  margin-top:20px;
  position:relative;
}

.tap{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle, #ffcc00, #b8860b);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 40px gold;
}

.tap img{
  width:100px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:10px;
  width:95%;
  max-width:400px;
  display:flex;
  justify-content:space-between;
}

.nav button{
  flex:1;
  margin:5px;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#111;
  color:#ffb347;
  font-size:16px;
}

/* FLOAT */
.float{
  position:absolute;
  color:gold;
  animation:up 1s forwards;
}
@keyframes up{
  0%{opacity:1;}
  100%{opacity:0; transform:translateY(-60px);}
}
</style>
</head>

<body>

<!-- BALANCE -->
<div class="card">
  <div class="center"><b>👑 Balance</b></div>

  <div class="row">
    <div>Level:</div>
    <div class="orange">1</div>
  </div>

  <div class="row">
    <div>Coins:</div>
    <div class="orange" id="coins">0</div>
  </div>

  <div class="row">
    <div>USDT:</div>
    <div class="orange" id="usdt">0.00</div>
  </div>
</div>

<!-- LEVEL -->
<div class="card">
  <div class="center">Next Level</div>
  <div class="bar">
    <div class="fill"></div>
  </div>
  <div class="center">10%</div>
</div>

<!-- COIN -->
<div class="tap-wrap">
  <div class="tap" onclick="tap()" id="tapBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/138/138292.png">
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="join()">👍 Home</button>
  <button onclick="profile()">👤 Profile</button>
  <button onclick="withdraw()">📩 Withdraw</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API="https://node-js-dsmy.onrender.com";
let user = tg.initDataUnsafe?.user?.username || "guest";

// TAP
function tap(){
fetch(API+"/tap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(update);

// effect
let plus=document.createElement("div");
plus.innerText="+1";
plus.className="float";

let rect=document.getElementById("tapBtn").getBoundingClientRect();
plus.style.left="50%";
plus.style.top="50%";

document.querySelector(".tap-wrap").appendChild(plus);
setTimeout(()=>plus.remove(),1000);
}

// UPDATE
function update(data){
if(!data) return;
document.getElementById("coins").innerText=data.coins||0;
document.getElementById("usdt").innerText=((data.coins||0)/100).toFixed(2);
}

// SIMPLE ACTIONS
function join(){
fetch(API+"/join-telegram",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(update);
}

function profile(){
alert("Profile coming soon");
}

function withdraw(){
let amount=prompt("Amount?");
let wallet=prompt("Wallet?");
fetch(API+"/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,amount,wallet})})
.then(r=>r.json()).then(d=>alert(d.message||d.error));
}
</script>

</body>
    </html>
