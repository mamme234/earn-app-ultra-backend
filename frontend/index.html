<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Crypto Ultra</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h2>💰 Crypto App</h2>

<div>
Coins: <span id="coins">0</span><br>
USDT: <span id="usdt">0</span>
</div>

<br>

<button onclick="tap()">🔥 TAP</button>

<br><br>

<button onclick="task('tg')">Telegram +500</button>
<button onclick="task('tiktok')">TikTok +1000</button>
<button onclick="task('yt')">YouTube +500</button>

<br><br>

<input id="refLink" readonly>
<button onclick="copyRef()">Copy Ref</button>

<br><br>

<input id="dep" placeholder="Deposit USDT">
<button onclick="deposit()">Deposit</button>

<br><br>

<input id="amount" placeholder="Withdraw USDT">
<button onclick="withdraw()">Withdraw</button>

<script>
const API="https://my-app1-k5fk.onrender.com";

const tg=window.Telegram.WebApp;
tg.expand();

let user=tg.initDataUnsafe?.user?.username||"guest";
let ref=new URLSearchParams(location.search).get("start");

let state={coins:0,refs:0,deposit:0};

// LOGIN
function load(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,ref:ref})
})
.then(r=>r.json())
.then(d=>{
state=d.user;
update();
});
}

// TAP
function tap(){
fetch(API+"/tap",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json())
.then(d=>{state=d.user;update();});
}

// TASK
function task(type){
fetch(API+"/reward",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,type:type})})
.then(r=>r.json())
.then(d=>{state=d.user;update();});
}

// DEPOSIT
function deposit(){
let amount=document.getElementById("dep").value;
fetch(API+"/deposit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,amount})})
.then(r=>r.json())
.then(d=>{state=d.user;update();alert("Deposit done");});
}

// WITHDRAW
function withdraw(){
let amount=document.getElementById("amount").value;
fetch(API+"/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,amount})})
.then(r=>r.json())
.then(d=>alert(d.error||d.message));
}

// UPDATE
function update(){
document.getElementById("coins").innerText=state.coins;
document.getElementById("usdt").innerText=(state.coins/100).toFixed(2);
document.getElementById("refLink").value=location.origin+"?start="+user;
}

// COPY
function copyRef(){
navigator.clipboard.writeText(document.getElementById("refLink").value);
alert("Copied");
}

load();
</script>

</body>
</html>
