<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Crypto Final</title>

<style>
body{margin:0;background:#0f0f0f;color:white;text-align:center;font-family:sans-serif;}
.screen{display:none;padding:20px;}
.active{display:block;}
.nav{position:fixed;bottom:0;width:100%;background:#111;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#00ffcc;color:black;}
input{padding:10px;margin:5px;border-radius:5px;border:none;}
.tap{width:120px;height:120px;background:gold;border-radius:50%;margin:auto;font-size:30px;display:flex;align-items:center;justify-content:center;}
</style>

</head>
<body>

<!-- SUBSCRIBE -->
<div id="sub" class="screen active">
<h2>Subscribe First</h2>
<a href="https://www.youtube.com/@Mamme234" target="_blank">
<button>Subscribe YouTube</button>
</a><br>
<button onclick="unlock()">I Subscribed</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
<h2>Home</h2>
<p>Coins: <span id="coins">0</span></p>
<p>USDT: <span id="usdt">0</span></p>
<div class="tap" onclick="tap()">💰</div>
<button onclick="spin()">Spin</button>
<button onclick="daily()">Daily</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2>Profile</h2>
<input id="username" placeholder="Username"><br>

<a href="https://t.me/gangs234" target="_blank">
<button onclick="joinTelegram()">Join Telegram +500</button>
</a><br>

<a href="https://www.youtube.com/@Mamme234" target="_blank">
<button onclick="reward('youtube')">YouTube +100</button>
</a><br>

<a href="https://www.tiktok.com/@mammeliyas" target="_blank">
<button onclick="reward('tiktok')">TikTok +1000</button>
</a>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="screen">
<h2>Withdraw</h2>
<input id="amount" placeholder="USDT"><br>
<input id="wallet" placeholder="Binance wallet"><br>
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('profile')">Profile</button>
<button onclick="show('withdraw')">Withdraw</button>
</div>

<script>
const API="https://earn-app-ultra-backend-1.onrender.com";
let user="";
let subscribed=false;

function unlock(){subscribed=true;show('home');}
function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(s).classList.add('active');}

function login(){
user=document.getElementById("username").value;
fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(update);
}

function tap(){
fetch(API+"/tap",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(update);
}

function daily(){
fetch(API+"/daily",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(d=>{alert(d.message);if(d.user)update(d.user);});
}

function spin(){
fetch(API+"/spin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(d=>{alert("Win "+d.win);update(d.user);});
}

function joinTelegram(){
fetch(API+"/join-telegram",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user})})
.then(r=>r.json()).then(update);
}

function reward(type){
fetch(API+"/reward",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,type})})
.then(r=>r.json()).then(update);
}

function withdraw(){
let amount=document.getElementById("amount").value;
let wallet=document.getElementById("wallet").value;

fetch(API+"/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,amount,wallet})})
.then(r=>r.json()).then(d=>alert(d.message||d.error));
}

function update(data){
document.getElementById("coins").innerText=data.coins;
document.getElementById("usdt").innerText=(data.coins/100).toFixed(2);
}
</script>

</body>
  </html>
