<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn App Ultra</title>

<style>
body{margin:0;background:#0f0f0f;color:white;text-align:center;font-family:sans-serif;}
.screen{display:none;padding:20px;}
.active{display:block;}
.nav{position:fixed;bottom:0;width:100%;background:#111;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#00ffcc;color:black;}
input{padding:10px;margin:5px;border-radius:5px;border:none;}
.tap{width:130px;height:130px;background:gold;border-radius:50%;margin:auto;font-size:30px;display:flex;align-items:center;justify-content:center;}
</style>

</head>
<body>

<!-- LOCK -->
<div id="lock" class="screen active">
<h2>🔒 Subscribe to Enter</h2>
<a href="https://www.youtube.com/@Mamme234" target="_blank">
<button>Subscribe YouTube</button>
</a>
<br>
<button onclick="unlock()">Unlock</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<button onclick="login()">Start</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
<h2>Home</h2>
<p>Coins: <span id="coins">0</span></p>
<p>USDT: <span id="usdt">0</span></p>

<div class="tap" onclick="tap()">💰</div>

<button onclick="spin()">Spin</button>
<button onclick="daily()">Daily</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2>Profile</h2>

<p>Referrals: <span id="refs">0</span></p>
<input id="refLink" readonly>

<a href="https://t.me/gangs234" target="_blank">
<button onclick="joinTelegram()">Join Telegram +500</button>
</a>

</div>

<!-- WITHDRAW -->
<div id="withdraw" class="screen">
<h2>Withdraw</h2>
<p>⚠️ Need 10 referrals</p>
<input id="amount" placeholder="USDT"><br>
<input id="wallet" placeholder="Wallet"><br>
<button onclick="withdraw()">Withdraw</button>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('profile')">Profile</button>
<button onclick="show('withdraw')">Withdraw</button>
</div>

<script>
const API="https://node-js-dsmy.onrender.com";

let user="";
let unlocked=false;

// REF
const params=new URLSearchParams(window.location.search);
const ref=params.get("ref");

// NAV
function show(s){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById(s).classList.add('active');
}

// LOCK
function unlock(){
unlocked=true;
show('login');
}

// LOGIN
function login(){
if(!unlocked) return alert("Subscribe first");

user=document.getElementById("username").value.trim();
if(!user) return alert("Enter username");

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,ref})
})
.then(r=>r.json())
.then(d=>{
update(d);
document.getElementById("refLink").value=location.origin+"?ref="+user;
show('home');
});
}

// CHECK USER
function checkUser(){
if(!user){
alert("Login first");
show('login');
return false;
}
return true;
}

// TAP
function tap(){
if(!checkUser()) return;

fetch(API+"/tap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(update);
}

// DAILY
function daily(){
if(!checkUser()) return;

fetch(API+"/daily",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(d=>{
alert(d.message);
if(d.user) update(d.user);
});
}

// SPIN
function spin(){
if(!checkUser()) return;

fetch(API+"/spin",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(d=>{
alert("Win "+d.win);
update(d.user);
});
}

// TELEGRAM
function joinTelegram(){
if(!checkUser()) return;

fetch(API+"/join-telegram",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(update);
}

// WITHDRAW
function withdraw(){
if(!checkUser()) return;

let amount=document.getElementById("amount").value;
let wallet=document.getElementById("wallet").value;

if(!amount||!wallet) return alert("Fill all");

fetch(API+"/withdraw",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,amount,wallet})
})
.then(r=>r.json())
.then(d=>alert(d.message||d.error));
}

// UPDATE
function update(data){
if(!data) return;
document.getElementById("coins").innerText=data.coins||0;
document.getElementById("usdt").innerText=((data.coins||0)/100).toFixed(2);
document.getElementById("refs").innerText=data.refs||0;
}
</script>

</body>
  </html>
